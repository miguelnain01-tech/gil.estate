<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miguel Nain Business Card - BOLD VERSION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @page {
            size: 3.5in 2in;
            margin: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0.25in;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 0.25in;
            align-items: center;
        }

        .label {
            font-family: 'Playfair Display', serif;
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Business Card: 3.5in x 2in */
        .business-card {
            width: 3.5in;
            height: 2in;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* BOLD FRONT - Dark with Gold */
        .card-front-bold {
            background: #2D3B2D;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.25in;
        }

        .card-front-bold::before {
            content: '';
            position: absolute;
            top: 0.12in;
            left: 0.12in;
            right: 0.12in;
            bottom: 0.12in;
            border: 1px solid #C9A962;
            opacity: 0.3;
        }

        .card-front-bold .name {
            font-family: 'Playfair Display', serif;
            font-size: 0.38in;
            color: #C9A962;
            letter-spacing: 0.08em;
            margin-bottom: 0.05in;
            z-index: 1;
        }

        .card-front-bold .title {
            font-family: 'Playfair Display', serif;
            font-size: 0.11in;
            color: #F5F1E8;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.15in;
            z-index: 1;
        }

        .card-front-bold .divider {
            width: 0.6in;
            height: 2px;
            background: #C9A962;
            margin-bottom: 0.15in;
            z-index: 1;
        }

        .card-front-bold .contact {
            font-family: 'Playfair Display', serif;
            font-size: 0.09in;
            color: #F5F1E8;
            letter-spacing: 0.08em;
            text-align: center;
            line-height: 1.6;
            z-index: 1;
        }

        .card-front-bold .contact span {
            display: block;
        }

        /* BOLD BACK - Light with Dark */
        .card-back-bold {
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.25in;
        }

        .card-back-bold::before {
            content: '';
            position: absolute;
            top: 0.15in;
            left: 0.15in;
            right: 0.15in;
            bottom: 0.15in;
            border: 1px solid #2D3B2D;
            opacity: 0.15;
        }

        .card-back-bold .logo {
            font-family: 'Playfair Display', serif;
            font-size: 0.5in;
            color: #2D3B2D;
            letter-spacing: 0.15em;
            margin-bottom: 0.03in;
            z-index: 1;
        }

        .card-back-bold .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 0.08in;
            color: #9A958C;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            z-index: 1;
        }

        /* ORIGINAL FRONT - No Icons */
        .card-front-original {
            background: #FFFFFF;
            display: flex;
        }

        .card-front-original .left-panel {
            width: 38%;
            background: #2D3B2D;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.15in;
            position: relative;
        }

        .card-front-original .left-panel::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 0.025in;
            background: #C9A962;
        }

        .card-front-original .logo-large {
            font-family: 'Playfair Display', serif;
            font-size: 0.32in;
            color: #C9A962;
            letter-spacing: 0.15em;
            margin-bottom: 0.02in;
        }

        .card-front-original .tagline {
            color: #F5F1E8;
            font-family: 'Playfair Display', serif;
            font-size: 0.07in;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .card-front-original .right-panel {
            width: 62%;
            padding: 0.2in;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-front-original .name {
            font-family: 'Playfair Display', serif;
            font-size: 0.26in;
            color: #2D3B2D;
            margin-bottom: 0.02in;
            font-weight: 600;
        }

        .card-front-original .title {
            color: #9A958C;
            font-family: 'Playfair Display', serif;
            font-size: 0.09in;
            letter-spacing: 0.05em;
            margin-bottom: 0.12in;
        }

        .card-front-original .contact-row {
            font-size: 0.1in;
            color: #1A1A1A;
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.04in;
            letter-spacing: 0.02em;
        }

        .card-front-original .brokerage {
            margin-top: 0.1in;
            padding-top: 0.06in;
            border-top: 1px solid #F5F1E8;
            font-size: 0.08in;
            color: #9A958C;
            font-family: 'Playfair Display', serif;
        }

        /* ORIGINAL BACK */
        .card-back-original {
            background: #2D3B2D;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.25in;
        }

        .card-back-original::before {
            content: '';
            position: absolute;
            top: 0.15in;
            left: 0.15in;
            right: 0.15in;
            bottom: 0.15in;
            border: 1px solid #C9A962;
            opacity: 0.25;
        }

        .card-back-original .logo-large {
            font-family: 'Playfair Display', serif;
            font-size: 0.45in;
            color: #C9A962;
            letter-spacing: 0.2em;
            margin-bottom: 0.03in;
            z-index: 1;
        }

        .card-back-original .tagline {
            color: #F5F1E8;
            font-family: 'Playfair Display', serif;
            font-size: 0.09in;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="label">Option 1: Bold (Dark Front / Light Back) — No Icons</div>
    
    <!-- BOLD FRONT -->
    <div class="business-card card-front-bold">
        <div class="name">Miguel</div>
        <div class="title">Real Estate Advisor</div>
        <div class="divider"></div>
        <div class="contact">
            <span>619.486.0868</span>
            <span>www.gil.estate</span>
        </div>
    </div>

    <!-- BOLD BACK -->
    <div class="business-card card-back-bold">
        <div class="logo">GIL</div>
        <div class="tagline">San Diego</div>
    </div>

    <div class="label">Option 2: Original Style — No Icons</div>
    
    <!-- ORIGINAL FRONT -->
    <div class="business-card card-front-original">
        <div class="left-panel">
            <div class="logo-large">GIL</div>
            <div class="tagline">Estate</div>
        </div>
        <div class="right-panel">
            <div class="name">Miguel</div>
            <div class="title">Coldwell Banker West</div>
            <div class="contact-row">619.486.0868</div>
            <div class="contact-row">miguel@gil.estate</div>
            <div class="contact-row">www.gil.estate</div>
            <div class="brokerage">CA DRE #02296203</div>
        </div>
    </div>

    <!-- ORIGINAL BACK -->
    <div class="business-card card-back-original">
        <div class="logo-large">GIL</div>
        <div class="tagline">San Diego Real Estate</div>
    </div>
</body>
</html>
