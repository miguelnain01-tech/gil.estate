<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Refreshing Gil Estate...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2d5f2f, #4a704a);
            color: white;
            text-align: center;
        }
        .refresh-message {
            padding: 2rem;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #b8860b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="refresh-message">
        <h1>🏠 Gil Estate</h1>
        <div class="spinner"></div>
        <p>Loading your new luxury website...</p>
        <p style="font-size: 0.9rem; opacity: 0.8;">Clearing cache and updating design</p>
    </div>

    <script>
        // Force cache clear and redirect
        setTimeout(() => {
            const timestamp = Date.now();
            window.location.href = `index.html?v=${timestamp}&fresh=true`;
        }, 2000);
        
        // Alternative: try opening in new window to bypass cache
        setTimeout(() => {
            if (window.location.href.includes('refresh.html')) {
                window.open(`index.html?nocache=${Date.now()}`, '_blank');
            }
        }, 3000);
    </script>
</body>
</html>
